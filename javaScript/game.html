<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice">
            <img src="download.png" alt="" id="paper" height="100px" width="100px">
        </div>
        <div class="choice">
            <img src="download (1).png" alt="" id="Scissor" - height="100px" width="100px">
        </div>
        <div class="choice">
            <img src="download.jfif" alt="" id="rock" height="100px" width="100px">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user_score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="computer_score">0</p>
            <p>Computer</p>
        </div>
    </div>


    <div class="container">
        <div id="msg">Play more</div>
    </div>

    <script src="game.js"></script>
</body>

</html>
