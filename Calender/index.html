<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
*{
    margin: 0%;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}
body{
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: grey;

}
.calc{
    border: 2 px solid rgb(24, 27, 180);
    border-radius: 15px;
   
 
    
    padding: 20px;
}
input{
    width: 100%;
    border: none;
   
    
    padding: 24px;
    margin: 10px;

    

}button{
    border: none;
    width: 60px;
}

</style>
<body>
    <div class="calc">
        <input type="text" placeholder="0" id="input">
    <div>
    <button>AC</button>
    <button>DEL</button>
    <button>%</button>
    <button class="operator">/</button>  
    <div>
<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">*</button>
    </div>
    <div>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">+</button>
    </div>

    <div>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">-</button>
    </div>
    </div>
    <script src="index.js"></script> 
</body>
</html>
